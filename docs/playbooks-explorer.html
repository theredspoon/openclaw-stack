<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Playbook Explorer</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #161822; --bg3: #1e2030; --bg4: #282a3a;
    --fg: #cdd6f4; --fg2: #a6adc8; --fg3: #6c7086;
    --blue: #89b4fa; --green: #a6e3a1; --yellow: #f9e2af;
    --red: #f38ba8; --purple: #cba6f7; --peach: #fab387;
    --teal: #94e2d5; --pink: #f5c2e7; --sky: #89dceb;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden; }
  #app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: auto 1fr auto; height: 100vh; }
  header { grid-column: 1 / -1; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--bg4); display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 14px; font-weight: 600; color: var(--fg); white-space: nowrap; }
  header .tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--radius); padding: 2px; }
  header .tab { padding: 5px 12px; border-radius: 4px; border: none; background: none; color: var(--fg3); cursor: pointer; font-size: 12px; font-family: inherit; transition: all .15s; }
  header .tab:hover { color: var(--fg2); }
  header .tab.active { background: var(--bg4); color: var(--fg); }
  header .stats { margin-left: auto; font-size: 11px; color: var(--fg3); display: flex; gap: 12px; }
  header .stats span { display: flex; align-items: center; gap: 4px; }
  header .stats .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  #sidebar { background: var(--bg2); border-right: 1px solid var(--bg4); overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
  .panel { background: var(--bg3); border-radius: var(--radius); padding: 10px; }
  .panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--fg3); margin-bottom: 8px; }
  .preset-btn { width: 100%; padding: 6px 8px; border: 1px solid var(--bg4); border-radius: 4px; background: none; color: var(--fg2); cursor: pointer; font-size: 12px; font-family: inherit; text-align: left; margin-bottom: 4px; transition: all .15s; }
  .preset-btn:hover { border-color: var(--blue); color: var(--fg); }
  .preset-btn.active { border-color: var(--blue); background: rgba(137,180,250,.1); color: var(--blue); }
  .layer-toggle { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; font-size: 12px; color: var(--fg2); }
  .layer-toggle input { accent-color: var(--blue); }
  .layer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .comment-item { padding: 6px 8px; background: var(--bg4); border-radius: 4px; margin-bottom: 4px; font-size: 11px; position: relative; cursor: pointer; }
  .comment-item:hover { background: #2a2c3e; }
  .comment-item .target { color: var(--blue); font-weight: 500; }
  .comment-item .text { color: var(--fg2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .comment-item .del { position: absolute; top: 4px; right: 6px; background: none; border: none; color: var(--fg3); cursor: pointer; font-size: 10px; opacity: 0; transition: opacity .15s; }
  .comment-item:hover .del { opacity: 1; }
  #main { overflow: hidden; position: relative; }
  #canvas { width: 100%; height: 100%; }
  .node { cursor: pointer; }
  .node rect { transition: all .15s; }
  .node:hover rect { filter: brightness(1.15); }
  .node text { pointer-events: none; }
  #detail { position: absolute; top: 0; right: 0; width: 380px; height: 100%; background: var(--bg2); border-left: 1px solid var(--bg4); overflow-y: auto; padding: 14px; display: none; z-index: 10; }
  #detail.open { display: block; }
  #detail .close-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--fg3); cursor: pointer; font-size: 16px; }
  #detail h2 { font-size: 14px; color: var(--fg); margin-bottom: 4px; padding-right: 24px; }
  #detail .meta { font-size: 11px; color: var(--fg3); margin-bottom: 12px; line-height: 1.5; }
  .section-item { padding: 8px; background: var(--bg3); border-radius: 4px; margin-bottom: 4px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; }
  .section-item:hover { background: var(--bg4); }
  .section-item.selected { border-left-color: var(--blue); background: var(--bg4); }
  .section-item .name { font-size: 12px; color: var(--fg); font-weight: 500; }
  .section-item .info { font-size: 10px; color: var(--fg3); margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; }
  .section-item .badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
  .badge-mc { background: rgba(137,180,250,.15); color: var(--blue); }
  .badge-cond { background: rgba(148,226,213,.15); color: var(--teal); }
  .badge-stop { background: rgba(243,139,168,.15); color: var(--red); }
  .badge-bg { background: rgba(203,166,247,.15); color: var(--purple); }
  .badge-src { background: rgba(166,227,161,.15); color: var(--green); }
  .badge-tier { background: rgba(249,226,175,.15); color: var(--yellow); }
  .knowledge-btns { display: flex; gap: 2px; margin-top: 4px; }
  .knowledge-btns button { font-size: 9px; padding: 2px 6px; border-radius: 3px; border: 1px solid var(--bg4); background: none; color: var(--fg3); cursor: pointer; font-family: inherit; }
  .knowledge-btns button.k-know { border-color: var(--green); color: var(--green); background: rgba(166,227,161,.1); }
  .knowledge-btns button.k-fuzzy { border-color: var(--yellow); color: var(--yellow); background: rgba(249,226,175,.1); }
  .knowledge-btns button.k-unknown { border-color: var(--red); color: var(--red); background: rgba(243,139,168,.1); }
  #bottom { grid-column: 1 / -1; background: var(--bg2); border-top: 1px solid var(--bg4); display: grid; grid-template-columns: 1fr auto; max-height: 180px; }
  #prompt-area { padding: 10px 16px; overflow-y: auto; }
  #prompt-area h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--fg3); margin-bottom: 6px; }
  #prompt-text { font-size: 12px; color: var(--fg2); line-height: 1.5; font-family: ui-monospace, 'SF Mono', monospace; white-space: pre-wrap; max-height: 130px; overflow-y: auto; }
  #copy-btn { align-self: start; margin: 10px 16px 10px 0; padding: 6px 14px; border: 1px solid var(--bg4); border-radius: 4px; background: var(--bg3); color: var(--fg2); cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap; transition: all .15s; }
  #copy-btn:hover { border-color: var(--blue); color: var(--blue); }
  #copy-btn.copied { border-color: var(--green); color: var(--green); }
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: none; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--bg3); border: 1px solid var(--bg4); border-radius: 8px; padding: 16px; width: 380px; }
  #modal h3 { font-size: 13px; margin-bottom: 8px; }
  #modal textarea { width: 100%; height: 80px; background: var(--bg); border: 1px solid var(--bg4); border-radius: 4px; color: var(--fg); padding: 8px; font-size: 12px; font-family: inherit; resize: vertical; }
  #modal .btns { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  #modal .btns button { padding: 5px 12px; border-radius: 4px; border: 1px solid var(--bg4); background: none; color: var(--fg2); cursor: pointer; font-size: 12px; font-family: inherit; }
  #modal .btns .save { background: rgba(137,180,250,.15); border-color: var(--blue); color: var(--blue); }
  #insights-view, #matrix-view { position: absolute; inset: 0; background: var(--bg); overflow-y: auto; padding: 20px; display: none; z-index: 5; }
  #insights-view.open, #matrix-view.open { display: block; }
  .insight-card { background: var(--bg3); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--peach); cursor: pointer; transition: all .15s; }
  .insight-card:hover { background: var(--bg4); }
  .insight-card.sev-high { border-left-color: var(--red); }
  .insight-card.sev-med { border-left-color: var(--peach); }
  .insight-card.sev-low { border-left-color: var(--yellow); }
  .insight-card.sev-info { border-left-color: var(--blue); }
  .insight-card.sev-done { border-left-color: var(--green); }
  .insight-card .title { font-size: 12px; font-weight: 600; color: var(--fg); }
  .insight-card .playbook { font-size: 10px; color: var(--fg3); margin-top: 2px; }
  .insight-card .desc { font-size: 11px; color: var(--fg2); margin-top: 6px; line-height: 1.4; }
  .sev-tag { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600; float: right; }
  .sev-tag.high { background: rgba(243,139,168,.15); color: var(--red); }
  .sev-tag.med { background: rgba(250,179,135,.15); color: var(--peach); }
  .sev-tag.low { background: rgba(249,226,175,.15); color: var(--yellow); }
  .sev-tag.info { background: rgba(137,180,250,.15); color: var(--blue); }
  .sev-tag.done { background: rgba(166,227,161,.15); color: var(--green); }
  .matrix-table { border-collapse: collapse; font-size: 11px; width: 100%; }
  .matrix-table th, .matrix-table td { padding: 6px 8px; border: 1px solid var(--bg4); text-align: center; }
  .matrix-table th { background: var(--bg3); color: var(--fg2); font-weight: 500; position: sticky; top: 0; z-index: 1; }
  .matrix-table th:first-child { text-align: left; min-width: 180px; }
  .matrix-table td:first-child { text-align: left; font-weight: 500; color: var(--fg); background: var(--bg2); }
  .matrix-table .yes { color: var(--green); }
  .matrix-table .partial { color: var(--yellow); }
  .matrix-table .no { color: var(--red); }
  .matrix-table .na { color: var(--fg3); }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend-item { font-size: 10px; color: var(--fg3); display: flex; align-items: center; gap: 4px; }
  .section-note { font-size: 10px; color: var(--blue); margin-top: 2px; }
</style>
</head>

<div id="app">
  <header>
    <h1>OpenClaw Playbook Explorer</h1>
    <div class="tabs">
      <button class="tab active" data-view="pipeline">Pipeline</button>
      <button class="tab" data-view="matrix">Matrix</button>
      <button class="tab" data-view="insights">Insights</button>
    </div>
    <div class="stats">
      <span><span class="dot" style="background:var(--green)"></span> <span id="stat-know">0</span> understood</span>
      <span><span class="dot" style="background:var(--yellow)"></span> <span id="stat-fuzzy">0</span> fuzzy</span>
      <span><span class="dot" style="background:var(--red)"></span> <span id="stat-unknown">0</span> unknown</span>
      <span style="color:var(--fg3)">|</span>
      <span id="stat-comments">0 comments</span>
    </div>
  </header>
  <div id="sidebar">
    <div class="panel">
      <h3>Presets</h3>
      <button class="preset-btn active" data-preset="full">Full Deploy Pipeline</button>
      <button class="preset-btn" data-preset="parallel">Parallel Paths</button>
      <button class="preset-btn" data-preset="multiclaw">Multi-Claw Focus</button>
      <button class="preset-btn" data-preset="context">Context Budget</button>
      <button class="preset-btn" data-preset="tiers">Verification Tiers</button>
    </div>
    <div class="panel">
      <h3>Layers</h3>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="entry"><span class="layer-dot" style="background:var(--blue)"></span> Entry / Orchestration</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="deploy"><span class="layer-dot" style="background:var(--yellow)"></span> Deployment</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="verify"><span class="layer-dot" style="background:var(--green)"></span> Verification</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="post"><span class="layer-dot" style="background:var(--purple)"></span> Post-Deploy</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="maint"><span class="layer-dot" style="background:var(--fg3)"></span> Maintenance</label>
      <label class="layer-toggle"><input type="checkbox" checked data-layer="analysis"><span class="layer-dot" style="background:var(--teal)"></span> Analysis</label>
    </div>
    <div class="panel" style="flex:1;overflow-y:auto">
      <h3>Comments (<span id="comment-count">0</span>)</h3>
      <div id="comments-list"></div>
      <div id="no-comments" style="font-size:11px;color:var(--fg3);text-align:center;padding:8px;">Click any playbook node to add comments</div>
    </div>
  </div>
  <div id="main">
    <svg id="canvas"></svg>
    <div id="detail">
      <button class="close-btn" onclick="closeDetail()">&times;</button>
      <h2 id="detail-title"></h2>
      <div class="meta" id="detail-meta"></div>
      <div id="detail-sections"></div>
    </div>
    <div id="insights-view"></div>
    <div id="matrix-view"></div>
  </div>
  <div id="bottom">
    <div id="prompt-area">
      <h3>Generated Prompt</h3>
      <div id="prompt-text">Select playbooks and mark knowledge levels, add comments, or select insights to generate a prompt.</div>
    </div>
    <button id="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
  </div>
</div>
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Add Comment</h3>
    <textarea id="modal-input" placeholder="What needs to change here?"></textarea>
    <div class="btns">
      <button onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveComment()">Save</button>
    </div>
  </div>
</div>

// ─── Rendering ─────────────────────────────────────────────────────────────

const NW = 155, NH = 52, NR = 6;

function getNodePositions() {
  const base = playbooks.map(p => ({...p}));
  if (state.preset === 'parallel') {
    base.forEach(p => {
      if (p.id === '01-workers') { p.x = 180; p.y = 150; }
      if (p.id === '02-base') { p.x = 620; p.y = 150; }
    });
  }
  if (state.preset === 'multiclaw') {
    base.forEach(p => {
      const mcCount = p.sections.filter(s => s.mc).length;
      if (mcCount === 0 && p.id !== 'reboot') p._dim = true;
    });
  }
  if (state.preset === 'context') {
    const sub = new Set(['01-workers','02-base','03b-sysbox','04-openclaw']);
    base.forEach(p => { p._subagent = sub.has(p.id); });
  }
  if (state.preset === 'tiers') {
    base.forEach(p => { if (p.id !== '07-verify') p._dim = true; });
  }
  return base;
}

function renderCanvas() {
  const svg = document.getElementById('canvas');
  const nodes = getNodePositions().filter(n => state.layers[n.layer]);
  const rect = svg.parentElement.getBoundingClientRect();
  const svgH = Math.max(rect.height, 970);
  svg.setAttribute('viewBox', `0 0 ${rect.width} ${svgH}`);

  let html = '<defs>';
  html += '<marker id="arr-seq" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6c7086"/></marker>';
  html += '<marker id="arr-par" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#89b4fa"/></marker>';
  html += '</defs>';

  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  connections.forEach(c => {
    const f = nodeMap[c.from], t = nodeMap[c.to];
    if (!f || !t) return;
    const fx = f.x + NW/2, fy = f.y + NH;
    const tx = t.x + NW/2, ty = t.y;
    const mx = (fx + tx) / 2, my = (fy + ty) / 2;
    const isPar = c.type === 'parallel';
    const color = isPar ? 'var(--blue)' : 'var(--fg3)';
    const dash = isPar ? '6,3' : 'none';
    const marker = isPar ? 'url(#arr-par)' : 'url(#arr-seq)';
    if (Math.abs(fx - tx) < 5) {
      html += `<line x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}" stroke="${color}" stroke-width="1.5" stroke-dasharray="${dash}" marker-end="${marker}"/>`;
    } else {
      html += `<path d="M${fx},${fy} C${fx},${my} ${tx},${my} ${tx},${ty}" fill="none" stroke="${color}" stroke-width="1.5" stroke-dasharray="${dash}" marker-end="${marker}"/>`;
    }
    if (c.label) {
      html += `<text x="${mx}" y="${my - 4}" text-anchor="middle" fill="var(--fg3)" font-size="9" font-family="system-ui">${c.label}</text>`;
    }
  });

  nodes.forEach(n => {
    const dim = n._dim ? 0.25 : 1;
    const mcCount = n.sections.filter(s => s.mc).length;
    const totalSections = n.sections.length;
    const selected = state.selectedPlaybook === n.id;

    html += `<g class="node" data-id="${n.id}" onclick="selectPlaybook('${n.id}')" opacity="${dim}">`;
    html += `<rect x="${n.x}" y="${n.y}" width="${NW}" height="${NH}" rx="${NR}" fill="${n.color}15" stroke="${selected ? n.color : n.color + '60'}" stroke-width="${selected ? 2 : 1}"/>`;

    if (n._subagent) {
      html += `<rect x="${n.x}" y="${n.y}" width="${NW}" height="${NH}" rx="${NR}" fill="none" stroke="var(--purple)" stroke-width="1" stroke-dasharray="4,2"/>`;
    }

    html += `<text x="${n.x + NW/2}" y="${n.y + 18}" text-anchor="middle" fill="${n.color}" font-size="11" font-weight="600" font-family="system-ui">${n.title}</text>`;
    let sub = `${n.lines}L`;
    if (totalSections > 0) sub += ` / ${totalSections}S`;
    if (n.verifSteps > 0) sub += ` / ${n.verifSteps}V`;
    html += `<text x="${n.x + NW/2}" y="${n.y + 32}" text-anchor="middle" fill="var(--fg3)" font-size="9" font-family="system-ui">${sub}</text>`;

    if (mcCount > 0 && state.preset !== 'multiclaw') {
      html += `<circle cx="${n.x + NW - 8}" cy="${n.y + 8}" r="5" fill="var(--blue)" opacity="0.8"/>`;
      html += `<text x="${n.x + NW - 8}" y="${n.y + 11}" text-anchor="middle" fill="var(--bg)" font-size="7" font-weight="700" font-family="system-ui">${mcCount}</text>`;
    }
    if (state.preset === 'multiclaw' && mcCount > 0) {
      html += `<text x="${n.x + NW/2}" y="${n.y + 46}" text-anchor="middle" fill="var(--blue)" font-size="8" font-family="system-ui">${mcCount}/${totalSections} multi-claw</text>`;
    }
    if (state.preset === 'context' && n._subagent) {
      html += `<text x="${n.x + NW/2}" y="${n.y + 46}" text-anchor="middle" fill="var(--purple)" font-size="8" font-family="system-ui">subagent</text>`;
    }
    if (state.preset === 'tiers' && n.id === '07-verify') {
      const t1 = n.sections.filter(s => s.tier === 1).length;
      const t2 = n.sections.filter(s => s.tier === 2).length;
      html += `<text x="${n.x + NW/2}" y="${n.y + 46}" text-anchor="middle" fill="var(--green)" font-size="8" font-family="system-ui">Tier 1: ${t1} / Tier 2: ${t2}</text>`;
    }

    const cc = state.comments.filter(c => c.playbookId === n.id).length;
    if (cc > 0) {
      html += `<circle cx="${n.x + 8}" cy="${n.y + 8}" r="6" fill="var(--peach)"/>`;
      html += `<text x="${n.x + 8}" y="${n.y + 11}" text-anchor="middle" fill="var(--bg)" font-size="8" font-weight="700" font-family="system-ui">${cc}</text>`;
    }

    const kSum = getKnowledgeSummary(n.id);
    if (kSum) {
      const kc = kSum === 'know' ? 'var(--green)' : kSum === 'fuzzy' ? 'var(--yellow)' : 'var(--red)';
      html += `<circle cx="${n.x + NW - 8}" cy="${n.y + NH - 8}" r="4" fill="${kc}"/>`;
    }

    html += '</g>';
  });

  const ly = svgH - 30;
  html += `<text x="20" y="${ly}" fill="var(--fg3)" font-size="10" font-family="system-ui">L = lines, S = sections, V = verification steps. Blue badge = multi-claw section count.</text>`;
  if (state.preset === 'context') html += `<text x="20" y="${ly-14}" fill="var(--purple)" font-size="10" font-family="system-ui">Dashed border = delegated to subagent (~71% of deployment lines)</text>`;
  if (state.preset === 'multiclaw') html += `<text x="20" y="${ly-14}" fill="var(--blue)" font-size="10" font-family="system-ui">Dimmed = no multi-claw sections</text>`;
  if (state.preset === 'tiers') html += `<text x="20" y="${ly-14}" fill="var(--green)" font-size="10" font-family="system-ui">Tier 1 = critical smoke test (5 sections). Tier 2 = extended validation (7 sections).</text>`;

  svg.innerHTML = html;
}

function getKnowledgeSummary(pbId) {
  const pb = playbooks.find(p => p.id === pbId);
  if (!pb || pb.sections.length === 0) return null;
  const levels = pb.sections.map(s => state.knowledge[`${pb.id}:${s.id}`]).filter(Boolean);
  if (levels.length === 0) return null;
  if (levels.includes('unknown')) return 'unknown';
  if (levels.includes('fuzzy')) return 'fuzzy';
  return 'know';
}

function selectPlaybook(id) {
  if (state.view !== 'pipeline') return;
  const pb = playbooks.find(p => p.id === id);
  if (!pb || pb.sections.length === 0) return;
  state.selectedPlaybook = id;
  renderDetail(pb);
  renderCanvas();
}

function renderDetail(pb) {
  document.getElementById('detail').classList.add('open');
  document.getElementById('detail-title').textContent = pb.title;
  document.getElementById('detail-meta').innerHTML =
    `<strong>${pb.name}</strong><br>${pb.lines} lines &middot; ${pb.codeBlocks} code blocks &middot; ${pb.sshCmds} SSH &middot; ${pb.fileDeploys} file deploys &middot; ${pb.verifSteps} verif<br><span style="color:var(--fg2)">${pb.desc}</span>`;

  let html = `<div style="margin-bottom:8px"><button style="font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--bg4);background:none;color:var(--peach);cursor:pointer;font-family:inherit" onclick="openCommentModal('${pb.id}',null,'${esc(pb.title)}')">+ Comment on playbook</button></div>`;

  pb.sections.forEach(s => {
    const key = `${pb.id}:${s.id}`;
    const k = state.knowledge[key] || '';
    const hasCmt = state.comments.some(c => c.playbookId === pb.id && c.sectionId === s.id);
    html += `<div class="section-item ${hasCmt ? 'selected' : ''}">`;
    html += `<div class="name">${s.id}. ${s.name}</div>`;
    html += `<div class="info"><span>~${s.lines}L</span>`;
    if (s.mc) html += `<span class="badge badge-mc">multi-claw</span>`;
    if (s.cond) html += `<span class="badge badge-cond">conditional</span>`;
    if (s.stop) html += `<span class="badge badge-stop">mandatory stop</span>`;
    if (s.bg) html += `<span class="badge badge-bg">background</span>`;
    if (s.src) html += `<span class="badge badge-src">SOURCE</span>`;
    if (s.tier) html += `<span class="badge badge-tier">tier ${s.tier}</span>`;
    html += '</div>';
    if (s.mcNote) html += `<div class="section-note">${s.mcNote}</div>`;
    if (s.condNote) html += `<div class="section-note" style="color:var(--teal)">${s.condNote}</div>`;
    if (s.stopNote) html += `<div class="section-note" style="color:var(--red)">${s.stopNote}</div>`;
    if (s.bgNote) html += `<div class="section-note" style="color:var(--purple)">${s.bgNote}</div>`;
    if (s.src) html += `<div class="section-note" style="color:var(--green)">${s.src}</div>`;
    html += '<div class="knowledge-btns">';
    html += `<button class="${k==='know'?'k-know':''}" onclick="setKnowledge('${key}','know')">Understood</button>`;
    html += `<button class="${k==='fuzzy'?'k-fuzzy':''}" onclick="setKnowledge('${key}','fuzzy')">Fuzzy</button>`;
    html += `<button class="${k==='unknown'?'k-unknown':''}" onclick="setKnowledge('${key}','unknown')">Unknown</button>`;
    html += `<button style="margin-left:auto;color:var(--peach)" onclick="openCommentModal('${pb.id}','${s.id}','${esc(s.id + '. ' + s.name)}')">+ Comment</button>`;
    html += '</div></div>';
  });
  document.getElementById('detail-sections').innerHTML = html;
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  state.selectedPlaybook = null;
  renderCanvas();
}

function setKnowledge(key, level) {
  if (state.knowledge[key] === level) delete state.knowledge[key];
  else state.knowledge[key] = level;
  const pb = playbooks.find(p => p.id === key.split(':')[0]);
  if (pb) renderDetail(pb);
  renderCanvas(); updateStats(); updatePrompt();
}

// ─── Comments ──────────────────────────────────────────────────────────────

function openCommentModal(pbId, secId, label) {
  state.modalTarget = { playbookId: pbId, sectionId: secId, targetLabel: label };
  document.getElementById('modal-title').textContent = `Comment on: ${label}`;
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  state.modalTarget = null;
}

function saveComment() {
  const text = document.getElementById('modal-input').value.trim();
  if (!text || !state.modalTarget) return;
  state.comments.push({ id: Date.now(), playbookId: state.modalTarget.playbookId, sectionId: state.modalTarget.sectionId, target: state.modalTarget.targetLabel, text });
  closeModal();
  refreshAll();
}

function deleteComment(id) {
  state.comments = state.comments.filter(c => c.id !== id);
  refreshAll();
}

function refreshAll() {
  renderComments(); renderCanvas(); updateStats(); updatePrompt();
  if (state.selectedPlaybook) { const pb = playbooks.find(p => p.id === state.selectedPlaybook); if (pb) renderDetail(pb); }
}

function renderComments() {
  const el = document.getElementById('comments-list');
  const noEl = document.getElementById('no-comments');
  document.getElementById('comment-count').textContent = state.comments.length;
  if (state.comments.length === 0) { el.innerHTML = ''; noEl.style.display = 'block'; return; }
  noEl.style.display = 'none';
  el.innerHTML = state.comments.map(c =>
    `<div class="comment-item"><span class="target">${esc(c.target)}</span><div class="text">${esc(c.text)}</div><button class="del" onclick="deleteComment(${c.id})">x</button></div>`
  ).join('');
}

function renderInsights() {
  const el = document.getElementById('insights-view');

  const active = insights.filter(i => i.sev !== 'done');
  let html = '<h2 style="font-size:16px;margin-bottom:4px">Optimization Insights</h2>';
  html += `<p style="font-size:12px;color:var(--fg3);margin-bottom:16px">Analysis of ${playbooks.reduce((a,p)=>a+p.lines,0)} lines across ${playbooks.length} playbooks. Click active insights to include in prompt.</p>`;
  html += '<div class="legend">';
  ['done:Completed','high:High','med:Medium','low:Low','info:Info'].forEach(s => {
    const [k,l] = s.split(':');
    const colors = {done:'var(--green)',high:'var(--red)',med:'var(--peach)',low:'var(--yellow)',info:'var(--blue)'};
    html += `<span class="legend-item"><span style="width:8px;height:8px;border-radius:50%;background:${colors[k]};display:inline-block"></span> ${l}</span>`;
  });
  html += '</div>';

  if (done.length > 0) {
    html += '<h3 style="font-size:13px;color:var(--green);margin:12px 0 8px">Completed Optimizations</h3>';
    done.forEach(i => {
      html += `<div class="insight-card sev-done"><span class="sev-tag done">done</span>`;
      html += `<div class="title">${i.title}</div><div class="playbook">${i.playbook}</div>`;
      html += `<div class="desc">${i.desc}</div></div>`;
    });
  }

  html += '<h3 style="font-size:13px;color:var(--fg2);margin:16px 0 8px">Active Insights</h3>';
  active.forEach(i => {
    const sel = state.selectedInsights.has(i.id);
    html += `<div class="insight-card sev-${i.sev}" onclick="toggleInsight('${i.id}')" style="${sel ? 'border-width:2px;background:var(--bg4)' : ''}">`;
    html += `<span class="sev-tag ${i.sev}">${i.sev}</span>`;
    html += `<div class="title">${sel ? '&#10003; ' : ''}${i.title}</div><div class="playbook">${i.playbook}</div>`;
    html += `<div class="desc">${i.desc}</div>`;
    if (i.action) html += `<div style="font-size:10px;color:var(--teal);margin-top:6px"><strong>Suggested:</strong> ${i.action}</div>`;
    html += '</div>';
  });
  el.innerHTML = html;
}

function toggleInsight(id) {
  if (state.selectedInsights.has(id)) state.selectedInsights.delete(id);
  else state.selectedInsights.add(id);
  renderInsights(); updatePrompt();
}

// ─── Matrix ────────────────────────────────────────────────────────────────

function renderMatrix() {
  const el = document.getElementById('matrix-view');
  const features = [
    {key:'mc', label:'Multi-Claw', fn: s => s.mc},
    {key:'cond', label:'Conditional', fn: s => s.cond},
    {key:'stop', label:'Mandatory Stop', fn: s => s.stop},
    {key:'bg', label:'Background', fn: s => s.bg},
    {key:'src', label:'SOURCE file', fn: s => !!s.src},
  ];
  const pbs = playbooks.filter(p => p.sections.length > 0);

  let html = '<h2 style="font-size:16px;margin-bottom:4px">Playbook Feature Matrix</h2>';
  html += `<p style="font-size:12px;color:var(--fg3);margin-bottom:16px">${playbooks.length} playbooks, ${playbooks.reduce((a,p)=>a+p.lines,0)} total lines</p>`;

  html += '<table class="matrix-table"><thead><tr><th>Playbook</th><th>Lines</th><th>Sections</th><th>Verif</th>';
  features.forEach(f => html += `<th>${f.label}</th>`);
  html += '<th>SSH</th><th>Deploy</th></tr></thead><tbody>';

  let totLines = 0, totSec = 0, totVerif = 0, totSSH = 0, totDep = 0;
  pbs.forEach(p => {
    totLines += p.lines; totSec += p.sections.length; totVerif += p.verifSteps; totSSH += p.sshCmds; totDep += p.fileDeploys;
    html += `<tr><td style="cursor:pointer" onclick="setView('pipeline');selectPlaybook('${p.id}')">${p.title}</td><td>${p.lines}</td><td>${p.sections.length}</td><td>${p.verifSteps}</td>`;
    features.forEach(f => {
      const ct = p.sections.filter(f.fn).length, tot = p.sections.length;
      if (ct === tot && ct > 0) html += '<td class="yes">All</td>';
      else if (ct > 0) html += `<td class="partial">${ct}/${tot}</td>`;
      else html += '<td class="na">-</td>';
    });
    html += `<td>${p.sshCmds || '-'}</td><td>${p.fileDeploys || '-'}</td></tr>`;
  });
  html += `<tr style="font-weight:600"><td>TOTAL</td><td>${totLines}</td><td>${totSec}</td><td>${totVerif}</td>`;
  features.forEach(() => html += '<td></td>');
  html += `<td>${totSSH}</td><td>${totDep}</td></tr>`;
  html += '</tbody></table>';

  html += '<h3 style="font-size:14px;margin:20px 0 8px">All Sections Detail</h3>';
  html += '<table class="matrix-table"><thead><tr><th>Section</th><th>~Lines</th><th>Multi-Claw</th><th>Conditional</th><th>Stop</th><th>Tier</th><th>Knowledge</th></tr></thead><tbody>';
  pbs.forEach(p => {
    p.sections.forEach(s => {
      const key = `${p.id}:${s.id}`;
      const k = state.knowledge[key];
      const kH = k === 'know' ? '<span class="yes">Understood</span>' : k === 'fuzzy' ? '<span class="partial">Fuzzy</span>' : k === 'unknown' ? '<span class="no">Unknown</span>' : '<span class="na">-</span>';
      html += `<tr><td>${p.title} &rsaquo; ${s.id}. ${s.name}</td><td>${s.lines}</td>`;
      html += `<td class="${s.mc?'yes':'na'}">${s.mc ? (s.mcNote||'Yes') : '-'}</td>`;
      html += `<td class="${s.cond?'partial':'na'}">${s.cond ? (s.condNote||'Yes') : '-'}</td>`;
      html += `<td class="${s.stop?'no':'na'}">${s.stop ? 'Yes' : '-'}</td>`;
      html += `<td>${s.tier ? 'T'+s.tier : '-'}</td>`;
      html += `<td>${kH}</td></tr>`;
    });
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ─── Prompt ────────────────────────────────────────────────────────────────

function updatePrompt() {
  const parts = [];
  const fuzzy = [], unknown = [];
  Object.entries(state.knowledge).forEach(([key, level]) => {
    const [pbId, secId] = key.split(':');
    const pb = playbooks.find(p => p.id === pbId);
    const sec = pb?.sections.find(s => s.id === secId);
    if (!pb || !sec) return;
    const label = `${pb.name} > ${sec.id}. ${sec.name}`;
    if (level === 'fuzzy') fuzzy.push(label);
    if (level === 'unknown') unknown.push(label);
  });
  if (unknown.length > 0) parts.push(`I need detailed explanations of these playbook sections:\n${unknown.map(s => `- ${s}`).join('\n')}`);
  if (fuzzy.length > 0) parts.push(`I'm fuzzy on these sections and want clarification:\n${fuzzy.map(s => `- ${s}`).join('\n')}`);

  if (state.comments.length > 0) {
    const grouped = {};
    state.comments.forEach(c => {
      const pb = playbooks.find(p => p.id === c.playbookId);
      const key = pb ? pb.name : c.playbookId;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(c);
    });
    let cs = 'Feedback on specific sections:\n';
    Object.entries(grouped).forEach(([name, cmts]) => { cmts.forEach(c => { cs += `\n**${c.target}** (${name}):\n${c.text}\n`; }); });
    parts.push(cs);
  }

  if (state.selectedInsights.size > 0) {
    let is = 'Apply these optimizations:\n';
    insights.filter(i => state.selectedInsights.has(i.id)).forEach(i => { is += `\n- **${i.title}** (${i.playbook}): ${i.action}`; });
    parts.push(is);
  }

  if (parts.length === 0) {
    document.getElementById('prompt-text').textContent = 'Mark knowledge levels on sections, add comments, or select insights to generate a prompt.';
    return;
  }
  const total = playbooks.reduce((a,p)=>a+p.lines,0);
  document.getElementById('prompt-text').textContent = `Review the OpenClaw deployment playbooks (playbooks/ directory, ${total} lines across ${playbooks.length} files).\n\n${parts.join('\n\n')}`;
}

function copyPrompt() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 1500);
  });
}

function updateStats() {
  const vals = Object.values(state.knowledge);
  document.getElementById('stat-know').textContent = vals.filter(v => v === 'know').length;
  document.getElementById('stat-fuzzy').textContent = vals.filter(v => v === 'fuzzy').length;
  document.getElementById('stat-unknown').textContent = vals.filter(v => v === 'unknown').length;
  document.getElementById('stat-comments').textContent = `${state.comments.length} comments`;
}

// ─── View / Preset ─────────────────────────────────────────────────────────

function setView(view) {
  state.view = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.getElementById('insights-view').classList.toggle('open', view === 'insights');
  document.getElementById('matrix-view').classList.toggle('open', view === 'matrix');
  if (view === 'insights') renderInsights();
  if (view === 'matrix') renderMatrix();
  if (view === 'pipeline') renderCanvas();
  if (view !== 'pipeline') closeDetail();
}

function setPreset(preset) {
  state.preset = preset;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === preset));
  renderCanvas();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

// ─── Init ──────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setView(t.dataset.view)));
document.querySelectorAll('.preset-btn').forEach(b => b.addEventListener('click', () => setPreset(b.dataset.preset)));
document.querySelectorAll('[data-layer]').forEach(cb => cb.addEventListener('change', () => { state.layers[cb.dataset.layer] = cb.checked; renderCanvas(); }));
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeDetail(); } });
window.addEventListener('resize', () => { if (state.view === 'pipeline') renderCanvas(); });

renderCanvas(); renderComments(); updateStats(); updatePrompt();
</script>
</body>
</html>
