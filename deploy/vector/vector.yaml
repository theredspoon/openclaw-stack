# Vector configuration — ships Docker container logs to Cloudflare Log Receiver Worker
# https://vector.dev/docs/

# Collect logs from all Docker containers
sources:
  docker_logs:
    type: docker_logs

# Enrich with VPS identity (host field is already set by docker_logs source)
transforms:
  enrich:
    type: remap
    inputs:
      - docker_logs
    source: '.vps_ip = "${VPS1_IP}"'

  # Detect log level from message text so the worker can filter cheaply by field
  tag_level:
    type: remap
    inputs:
      - enrich
    source: |-
      msg = downcase(string!(.message))
      if match(msg, r'\b(panic|fatal)\b') {
        .level = "error"
      } else if match(msg, r'\berr(or)?\b') {
        .level = "error"
      } else if match(msg, r'\bwarn(ing)?\b') {
        .level = "warn"
      } else if match(msg, r'\bdebug\b') {
        .level = "debug"
      } else if match(msg, r'\btrace\b') {
        .level = "debug"
      } else if .stream == "stderr" {
        .level = "warn"
      } else {
        .level = "info"
      }

# Ship to Cloudflare Log Receiver Worker
sinks:
  cloudflare_worker:
    type: http
    inputs:
      - tag_level
    uri: "${LOG_WORKER_URL}"
    encoding:
      codec: json
    auth:
      strategy: bearer
      token: "${LOG_WORKER_TOKEN}"
    batch:
      max_bytes: 262144    # 256KB per batch
      timeout_secs: 60     # Ship at least every 60s
    request:
      retry_max_duration_secs: 300   # Keep retrying for 5 min on failures
