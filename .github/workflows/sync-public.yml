# .github/workflows/sync-public.yml
name: Sync public branch

on:
  push:
    branches: [public]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: public
          fetch-depth: 0
      - run: |
          REMOTE_URL="https://x-access-token:${TOKEN}@github.com/simple10/openclaw-stack.git"
          git remote add public-repo "$REMOTE_URL"
          git push public-repo public:main
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
