# .github/workflows/sync-public.yml
name: Sync public branch

on:
  push:
    branches: [public]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: public
          fetch-depth: 0
          persist-credentials: false
      - run: |
          git remote add public-repo https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/simple10/openclaw-stack.git
          git push public-repo public:main
